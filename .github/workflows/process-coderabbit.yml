name: Process CodeRabbit review

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  process:
    if: github.event.review.user.login == 'coderabbitai[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Process CodeRabbit findings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          claude --dangerously-skip-permissions -p "
            CodeRabbit has reviewed PR #${PR} on ${REPO}.
            1. Fetch all findings: gh pr view ${PR} --repo ${REPO} --json reviews,comments,reviewThreads
            2. For each CodeRabbit finding:
               - Valid: apply the fix, git commit, git push origin HEAD
               - Rejected: post an inline reply via gh api explaining why
            3. Do not merge the PR — only address the findings.
            Read CLAUDE.md in this repo for coding standards before making any changes.
          "
