language: "en-US"
reviews:
  auto_review:
    enabled: true
    base_branches:
      - "develop"
      - "master"
  profile: "chill"
  request_changes_workflow: true
  path_filters:
    - "!docs/**"
    - "!**/*.md"
    - "!prisma/migrations/**"
    - "!**/session-notes/**"
chat:
  auto_reply: true
